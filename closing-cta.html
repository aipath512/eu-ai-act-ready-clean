  <section id="closing-cta" style="max-width:900px; margin:60px auto; padding:40px 30px 0; border-top:1px solid #2a2a2a; color:#fff; text-align:center;">

    <h2 style="font-size:28px; margin:0 0 28px; text-transform:uppercase; color:#ff3e3e;">
      Ready to Prepare Your Organisation?
    </h2>

    <style>
      .cta-chain{
        display:grid;
        grid-template-columns:repeat(4, 1fr);
        gap:0;
        margin:0 auto 20px;
        max-width:760px;
      }
      @media(max-width:700px){
        .cta-chain{ grid-template-columns:1fr; gap:10px 0; }
      }
      .cta-step{
        position:relative;
        display:flex;
        align-items:center;
        justify-content:center;
        text-align:center;
        min-height:60px;
        padding:8px 16px 8px 6px;
      }
      .cta-box{
        border:1px solid rgba(255,51,51,.4);
        border-radius:10px;
        background:linear-gradient(160deg, rgba(20,20,20,.6), rgba(5,5,5,.8));
        padding:12px 10px;
        width:100%;
        font-size:12.5px;
        font-weight:800;
        color:#f0f0f0;
        text-transform:uppercase;
        letter-spacing:.01em;
        line-height:1.3;
      }
      .cta-step:not(:last-child)::after{
        content:"→";
        position:absolute;
        right:-4px;
        top:50%;
        transform:translateY(-50%);
        font-size:16px;
        font-weight:900;
        color:#ff3e3e;
        z-index:2;
      }
      @media(max-width:700px){
        .cta-step::after{ content:"↓" !important; right:auto !important; top:auto !important; bottom:-14px !important; left:50% !important; transform:translateX(-50%) !important; }
      }
    </style>

    <div class="cta-chain">
      <div class="cta-step"><div class="cta-box">Start Free</div></div>
      <div class="cta-step"><div class="cta-box">Ask One Question</div></div>
      <div class="cta-step"><div class="cta-box">Generate One Document</div></div>
      <div class="cta-step"><div class="cta-box">Upgrade Only If Useful</div></div>
    </div>

    <a href="#question" style="display:inline-block; background:linear-gradient(135deg,#ff2b2b,#c90016); color:#fff; font-weight:900; font-size:16px; text-decoration:none; padding:16px 40px; border-radius:10px; box-shadow:0 8px 18px rgba(217,0,24,.5); margin:20px 0 14px;">
      Start Free →
    </a>

    <p style="color:#999; font-size:13px; margin:0;">No pressure.</p>
