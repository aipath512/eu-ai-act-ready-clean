  <section id="stats" style="max-width:1200px; margin:0 auto 40px; padding:0 30px; color:#fff;">

    <style>
      .stats-grid{
        display:grid;
        grid-template-columns:repeat(4, 1fr);
        gap:16px;
      }
      @media(max-width:900px){
        .stats-grid{ grid-template-columns:repeat(2, 1fr); }
      }
      @media(max-width:560px){
        .stats-grid{ grid-template-columns:1fr; }
      }
      .stat-card{
        border:1px solid rgba(255,51,51,.35);
        border-radius:14px;
        padding:26px 20px;
        background:linear-gradient(160deg, rgba(20,20,20,.55), rgba(5,5,5,.75));
        text-align:center;
      }
      .stat-num{
        font-size:38px;
        font-weight:900;
        color:#ff2020;
        line-height:1.1;
        margin-bottom:6px;
      }
      .stat-label{
        font-size:12.5px;
        font-weight:800;
        color:#e5e5e5;
        text-transform:uppercase;
        letter-spacing:.03em;
      }
      .stat-card.badge .stat-num{
        font-size:22px;
        color:#00d4ff;
      }
    </style>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">113</div><div class="stat-label">Articles Indexed</div></div>
      <div class="stat-card"><div class="stat-num">70</div><div class="stat-label">Documents Generated</div></div>
      <div class="stat-card"><div class="stat-num">27</div><div class="stat-label">Languages</div></div>
      <div class="stat-card"><div class="stat-num">10</div><div class="stat-label">Operational Modules</div></div>
      <div class="stat-card"><div class="stat-num">7</div><div class="stat-label">Document Types</div></div>
      <div class="stat-card"><div class="stat-num">24/7</div><div class="stat-label">AI Assistant</div></div>
      <div class="stat-card badge"><div class="stat-num">✔</div><div class="stat-label">Inspector Ready</div></div>
      <div class="stat-card badge"><div class="stat-num">✔</div><div class="stat-label">Evidence Ready</div></div>
    </div>

  </section>
