  <section id="how-it-works" style="max-width:1200px; margin:0 auto 40px; padding:0 30px; color:#fff;">

    <h2 style="font-size:26px; margin:0 0 24px; text-transform:uppercase; color:#ff3e3e;">How It Works</h2>

    <style>
      .wf-chain{
        display:grid;
        grid-template-columns:repeat(7, 1fr);
        gap:0;
        align-items:stretch;
      }
      @media(max-width:900px){
        .wf-chain{ grid-template-columns:repeat(4, 1fr); gap:10px 0; }
      }
      @media(max-width:560px){
        .wf-chain{ grid-template-columns:1fr; gap:10px 0; }
      }
      .wf-step{
        position:relative;
        display:flex;
        align-items:center;
        justify-content:center;
        text-align:center;
        min-height:64px;
        padding:10px 18px 10px 8px;
        margin-right:-1px;
      }
      .wf-box{
        border:1px solid rgba(255,51,51,.4);
        border-radius:10px;
        background:linear-gradient(160deg, rgba(20,20,20,.6), rgba(5,5,5,.8));
        padding:12px 10px;
        width:100%;
        font-size:12.5px;
        font-weight:800;
        color:#f0f0f0;
        text-transform:uppercase;
        letter-spacing:.01em;
        line-height:1.3;
      }
      .wf-step:not(:last-child)::after{
        content:"→";
        position:absolute;
        right:-6px;
        top:50%;
        transform:translateY(-50%);
        font-size:18px;
        font-weight:900;
        color:#ff3e3e;
        z-index:2;
      }
      @media(max-width:900px){
        .wf-step:nth-child(4)::after{ content:"↓"; right:auto; top:auto; bottom:-14px; left:50%; transform:translateX(-50%); }
      }
      @media(max-width:560px){
        .wf-step::after{ content:"↓" !important; right:auto !important; top:auto !important; bottom:-14px !important; left:50% !important; transform:translateX(-50%) !important; }
      }
    </style>

    <div class="wf-chain">
      <div class="wf-step"><div class="wf-box">Ask</div></div>
      <div class="wf-step"><div class="wf-box">Understand Obligations</div></div>
      <div class="wf-step"><div class="wf-box">Analyse Company</div></div>
      <div class="wf-step"><div class="wf-box">Generate Documents</div></div>
      <div class="wf-step"><div class="wf-box">Review</div></div>
      <div class="wf-step"><div class="wf-box">Export</div></div>
      <div class="wf-step"><div class="wf-box">Ready For Audit</div></div>
    </div>

  </section>
