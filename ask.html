<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Full Ask | EU AI Act Ready™</title>
<link rel="canonical" href="https://eu-ai-act-ready.eu/ask.html" />
<meta name="description" content="Ask the EU AI Act — full-screen conversational search across 27 EU languages. EU AI Act Ready™.">
<meta name="robots" content="noindex, follow">

<style>
:root{
  --black:#000;
  --panel:#090909;
  --muted:#a8a8a8;
  --border:#2a2a2a;
  --red:#c90016;
  --red2:#ef001c;
}
*{ box-sizing:border-box; }
html,body{ height:100%; height:-webkit-fill-available; margin:0; }
html{ background:#000; color-scheme:dark; -webkit-text-size-adjust:100%; text-size-adjust:100%; height:100dvh; }

/* position:fixed pins body to the real visual viewport on mobile —
   100vh/height:100%+overflow:hidden alone breaks when the browser
   address bar shows/hides and clips the bottom composer offscreen */
body{
  position:fixed;
  inset:0;
  background:#000;
  color:#fff;
  font-family:Inter,Arial,Helvetica,sans-serif;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
a{ color:inherit; }

/* ===== Fixed top bar ===== */
.topbar{
  flex:0 0 auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 24px;
  border-bottom:1px solid var(--border);
  background:#050505;
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:900;
  letter-spacing:-.02em;
  font-size:15px;
  text-transform:uppercase;
}
.brand .dot{ width:9px; height:9px; border-radius:50%; background:var(--red); box-shadow:0 0 10px var(--red); }
.back-link{
  font-size:13px;
  font-weight:700;
  text-decoration:none;
  color:var(--muted);
  border-bottom:1px solid rgba(255,255,255,.25);
  padding-bottom:2px;
}
.back-link:hover{ color:#fff; border-color:#fff; }
.topbar-right{ display:flex; align-items:center; gap:10px; }
.lang-badge{
  font-size:11px;
  font-weight:800;
  letter-spacing:.05em;
  color:var(--muted);
  border:1px solid var(--border);
  border-radius:6px;
  padding:5px 9px;
  text-transform:uppercase;
  cursor:pointer;
  background:#0b0b0b;
}
.lang-badge:hover{ border-color:var(--red); color:#fff; }

/* ===== Scrollable message column ("ascensor" = scrollbar) ===== */
.chat-scroll{
  flex:1 1 auto;
  overflow-y:auto;
  min-height:0;
  -webkit-overflow-scrolling:touch;
}
.chat-scroll::-webkit-scrollbar{ width:10px; }
.chat-scroll::-webkit-scrollbar-track{ background:#050505; }
.chat-scroll::-webkit-scrollbar-thumb{ background:var(--red); border-radius:5px; }

.chat-inner{
  max-width:820px;
  margin:0 auto;
  padding:32px 20px 40px;
  display:flex;
  flex-direction:column;
  gap:22px;
  min-height:100%;
}

/* Empty state — shown before first question */
.empty-state{
  margin:auto 0;
  text-align:center;
  padding:24px 0;
}
.empty-state h1{
  font-family:Impact,"Arial Narrow",sans-serif;
  font-size:clamp(30px,7vw,56px);
  letter-spacing:-.02em;
  text-transform:uppercase;
  margin:0 0 6px;
}
.empty-state .sub{
  color:var(--red2);
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.05em;
  font-size:13px;
  margin-bottom:24px;
}
.chips{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  max-width:560px;
  margin:0 auto;
}
.chips button{
  min-height:56px;
  border:1px solid #333;
  border-radius:8px;
  background:#0b0b0b;
  color:#fff;
  padding:12px;
  cursor:pointer;
  font-size:14px;
  text-align:left;
}
.chips button:hover{ border-color:var(--red); background:#140004; }

/* Chat bubbles */
.msg{ display:flex; flex-direction:column; gap:6px; }
.msg.user{ align-items:flex-end; }
.msg.bot{ align-items:flex-start; }
.msg .role{
  font-size:11px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--muted);
}
.bubble{
  max-width:100%;
  padding:16px 20px;
  border-radius:14px;
  font-size:17px;
  line-height:1.65;
  white-space:pre-wrap;
}
.msg.user .bubble{
  background:var(--red);
  color:#fff;
  border-bottom-right-radius:4px;
}
.msg.bot{ width:100%; }
.msg.bot .bubble{
  width:100%;
  background:linear-gradient(#0d0d0d,#080808);
  border:1px solid #2a2a2a;
  color:#e2e2e2;
  border-bottom-left-radius:4px;
}
.bubble.thinking{ color:var(--muted); font-style:italic; }
.sources{ margin-top:10px; display:flex; flex-direction:column; gap:4px; }
.sources a{ color:#ff5a68; text-decoration:none; font-size:13px; }
.sources a:hover{ text-decoration:underline; }

/* Follow-up suggestions, Perplexity-style rows under an answer */
.followups{
  width:100%;
  display:flex;
  flex-direction:column;
  margin-top:14px;
  border-top:1px solid #232323;
}
.followups button{
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
  text-align:left;
  background:none;
  border:0;
  border-bottom:1px solid #1c1c1c;
  color:#d8d8d8;
  font-size:15px;
  padding:14px 4px;
  cursor:pointer;
  font-family:inherit;
}
.followups button:last-child{ border-bottom:0; }
.followups button:hover{ color:#fff; }
.followups .arrow{ color:var(--muted); font-size:14px; flex:0 0 auto; }

/* ===== Fixed bottom input ===== */
.composer-wrap{
  flex:0 0 auto;
  border-top:1px solid var(--border);
  background:#050505;
  padding:14px 16px calc(14px + env(safe-area-inset-bottom));
}
.composer{
  max-width:820px;
  margin:0 auto;
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:10px;
  align-items:center;
  min-height:54px;
  padding:6px 8px 6px 16px;
  border:1px solid #5b000a;
  border-radius:18px;
  background:rgba(10,10,10,.95);
  box-shadow:0 0 0 1px rgba(255,0,25,.08), 0 0 26px rgba(255,0,25,.14);
}
.composer .icon{ font-size:20px; }
.composer input{
  width:100%;
  min-width:0;
  border:0;
  outline:0;
  background:transparent;
  color:#fff;
  font-size:16px;
}
.composer input::placeholder{ color:#8d8d8d; }
.composer button{
  min-height:40px;
  border:0;
  border-radius:12px;
  padding:0 18px;
  background:var(--red);
  color:#fff;
  font-weight:900;
  font-size:13px;
  cursor:pointer;
  white-space:nowrap;
}
.composer button:disabled{ opacity:.6; cursor:default; }
.hint{
  max-width:820px;
  margin:8px auto 0;
  text-align:center;
  font-size:11px;
  color:#555;
}

@media(max-width:600px){
  .chips{ grid-template-columns:1fr; }
  .bubble{ font-size:16px; }
  .hint{ display:none; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="dot"></span> EU AI ACT READY™ — FULL ASK</div>
  <div class="topbar-right">
    <span class="lang-badge" id="langBadge" title="Click to change language">AUTO</span>
    <a class="back-link" href="index.html">← Back</a>
  </div>
</div>

<div class="chat-scroll" id="chatScroll">
  <div class="chat-inner" id="chatInner">
    <div class="empty-state" id="emptyState">
      <h1>ASK & GENERATOR™</h1>
      <div class="sub">Conversational EU AI Act — 27 EU Languages</div>
      <div class="chips">
        <button data-q="What does Article 4 require for AI literacy?">Article 4 — AI Literacy</button>
        <button data-q="How do I classify a high-risk AI system?">High-Risk Classification</button>
        <button data-q="What are Article 53 GPAI provider obligations under the EU AI Act?">GPAI Obligations</button>
        <button data-q="What does Article 50 require?">Article 50 — Transparency</button>
        <button data-q="How should I create an AI inventory?">AI Inventory</button>
      </div>
    </div>
    <!-- chat messages get appended here -->
  </div>
</div>

<div class="composer-wrap">
  <div class="composer">
    <span class="icon">⌕</span>
    <input id="question" type="text" placeholder="Ask anything about the EU AI Act..." autocomplete="off" autocorrect="off">
    <button id="ask">ASK ⚡</button>
  </div>
  <div class="hint">EU AI Act Ready™ · Ask & Generator™ · answers are grounded in Regulation (EU) 2024/1689</div>
</div>

<script>
const API = "https://eu-ai-act-conversation-worker-test.aipath512.workers.dev/search?q=";
const SUPPORTED_LANGS = ["en","fr","de","es","it","ro","pl"];

const questionInput = document.getElementById("question");
const askButton = document.getElementById("ask");
const chatScroll = document.getElementById("chatScroll");
const chatInner = document.getElementById("chatInner");
const emptyState = document.getElementById("emptyState");
const langBadge = document.getElementById("langBadge");

// ---- Auto-detect language from the browser, no manual dropdown ----
function detectLang(){
  const raw = (navigator.language || navigator.userLanguage || "en").toLowerCase();
  const code = raw.split("-")[0];
  return SUPPORTED_LANGS.includes(code) ? code : "en";
}
let currentLang = detectLang();
langBadge.textContent = currentLang.toUpperCase();

// Optional manual override: click the badge to cycle through languages
langBadge.addEventListener("click", function(){
  const i = SUPPORTED_LANGS.indexOf(currentLang);
  currentLang = SUPPORTED_LANGS[(i + 1) % SUPPORTED_LANGS.length];
  langBadge.textContent = currentLang.toUpperCase();
});

function scrollToBottom(){
  chatScroll.scrollTop = chatScroll.scrollHeight;
}

function addUserMessage(text){
  emptyState.style.display = "none";
  const wrap = document.createElement("div");
  wrap.className = "msg user";
  wrap.innerHTML = `<div class="role">You</div><div class="bubble">${text.replace(/</g,"&lt;")}</div>`;
  chatInner.appendChild(wrap);
  scrollToBottom();
}

function addBotMessage(html, thinking){
  const wrap = document.createElement("div");
  wrap.className = "msg bot";
  wrap.innerHTML = `<div class="role">EU AI Act Ready™</div><div class="bubble${thinking ? ' thinking' : ''}">${html}</div>`;
  chatInner.appendChild(wrap);
  scrollToBottom();
  return wrap.querySelector(".bubble");
}

// Generic fallback follow-ups (used when the API doesn't return its own
// suggestions) — one small set per supported language.
const FALLBACK_FOLLOWUPS = {
  en: ["Can you explain that in more detail?", "How does this apply to a small business?", "What documents do I need to prepare?"],
  fr: ["Peux-tu expliquer plus en détail ?", "Comment cela s'applique-t-il à une PME ?", "Quels documents dois-je préparer ?"],
  de: ["Kannst du das genauer erklären?", "Wie gilt das für ein kleines Unternehmen?", "Welche Dokumente muss ich vorbereiten?"],
  es: ["¿Puedes explicarlo con más detalle?", "¿Cómo se aplica esto a una pyme?", "¿Qué documentos necesito preparar?"],
  it: ["Puoi spiegarlo più in dettaglio?", "Come si applica a una PMI?", "Quali documenti devo preparare?"],
  ro: ["Poți detalia mai mult?", "Cum se aplică pentru un IMM?", "Ce documente trebuie să pregătesc?"],
  pl: ["Czy możesz to bardziej rozwinąć?", "Jak to dotyczy małej firmy?", "Jakie dokumenty muszę przygotować?"]
};

function renderFollowups(bubble, apiFollowups){
  const list = (apiFollowups && apiFollowups.length ? apiFollowups : FALLBACK_FOLLOWUPS[currentLang] || FALLBACK_FOLLOWUPS.en).slice(0, 3);
  if(!list.length) return;

  const box = document.createElement("div");
  box.className = "followups";
  list.forEach(function(q){
    const btn = document.createElement("button");
    btn.innerHTML = `<span class="arrow">↳</span><span>${q}</span>`;
    btn.addEventListener("click", function(){
      questionInput.value = q;
      ask();
    });
    box.appendChild(btn);
  });
  bubble.appendChild(box);
}

async function ask(){
  const question = questionInput.value.trim();
  if(!question) return;

  addUserMessage(question);
  questionInput.value = "";
  askButton.disabled = true;
  askButton.textContent = "...";

  const bubble = addBotMessage("Thinking...", true);

  try{
    const response = await fetch(API + encodeURIComponent(question) + "&lang=" + currentLang);
    const data = await response.json();

    bubble.classList.remove("thinking");

    if (data.generated_answer) {
      const sources = (data.sources || [])
        .map(s => `<a href="${s.url || '#'}" target="_blank" rel="noopener">→ ${s.label || s.url || ""}</a>`)
        .join("");
      bubble.innerHTML = `<div>${data.generated_answer}</div>${sources ? `<div class="sources">${sources}</div>` : ""}`;
      renderFollowups(bubble, data.follow_up_questions || data.related_questions || data.suggested_questions);
    } else if (data.answer) {
      bubble.innerHTML = `<div>${data.answer}</div>`;
      renderFollowups(bubble, data.follow_up_questions || data.related_questions || data.suggested_questions);
    } else {
      bubble.innerHTML = `<pre style="white-space:pre-wrap;color:#a8a8a8;font-size:13px;margin:0;">${JSON.stringify(data, null, 2)}</pre>`;
    }

    questionInput.placeholder = "Ask a follow up...";
  } catch(error){
    bubble.classList.remove("thinking");
    bubble.textContent = error.message;
  }

  askButton.disabled = false;
  askButton.textContent = "ASK ⚡";
  scrollToBottom();
}

askButton.addEventListener("click", ask);
questionInput.addEventListener("keydown", function(e){
  if(e.key === "Enter") ask();
});

document.querySelectorAll(".chips button").forEach(function(button){
  button.addEventListener("click", function(){
    questionInput.value = button.getAttribute("data-q");
    ask();
  });
});

</script>

</body>
</html>
