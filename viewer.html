<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Viewer — EU AI Act Ready</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
<style>
  :root {
    --bg: #0d0d0d; --card: #141414; --border: #2a2a2a;
    --text: #e8e8e8; --muted: #9a9a9a; --accent: #c0392b;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
  .topbar { position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px; background: var(--card); border-bottom: 1px solid var(--border); z-index: 10; }
  .topbar a { color: var(--muted); text-decoration: none; font-size: 14px; }
  .actions button { background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 6px;
    font-size: 14px; cursor: pointer; margin-left: 8px; }
  .actions button.secondary { background: #333; }
  #doc-wrap { max-width: 820px; margin: 0 auto; padding: 40px 24px 80px; }
  #status { color: var(--muted); padding: 40px 24px; }
  #content h1, #content h2, #content h3 { color: #fff; }
  #content pre { background: #1a1a1a; padding: 12px; border-radius: 6px; overflow-x: auto; }
  #content table { border-collapse: collapse; width: 100%; }
  #content th, #content td { border: 1px solid var(--border); padding: 6px 10px; }
  #content a { color: #e07a6e; }
  @media print {
    .topbar { display: none; }
    body { background: #fff; color: #000; }
    #content a { color: #000; text-decoration: underline; }
    #content pre { background: #f2f2f2; color: #000; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="/demo">← Back to documents</a>
  <div class="actions">
    <button class="secondary" onclick="window.location.href='/your-firm.html'">Unlock Full Set</button>
    <button onclick="window.print()">🖨 Print / Save as PDF</button>
  </div>
</div>

<div id="status">Loading document…</div>
<div id="doc-wrap"><div id="content"></div></div>

<script>
  // Reads ?src=/rrvi_templates/01-ai-system-inventory/01-checklist.md
  // Fetches it from THIS SAME SITE (no GitHub, no CORS issues)
  const params = new URLSearchParams(window.location.search);
  const src = params.get("src");

  const statusEl = document.getElementById("status");
  const contentEl = document.getElementById("content");

  if (!src) {
    statusEl.textContent = "No document specified. Go back and click a document again.";
  } else {
    fetch(src)
      .then(res => {
        if (!res.ok) throw new Error(`File not found (${res.status}): ${src}`);
        return res.text();
      })
      .then(md => {
        statusEl.style.display = "none";
        contentEl.innerHTML = marked.parse(md);
        const title = src.split("/").pop().replace(".md", "").replace(/[-_]/g, " ");
        document.title = title + " — EU AI Act Ready";
      })
      .catch(err => {
        statusEl.textContent = "Could not load this document (" + err.message + ").";
      });
  }
</script>

</body>
</html>
